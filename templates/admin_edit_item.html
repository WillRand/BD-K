{% extends "base.html" %}

{% block title %}Редактировать предмет{% endblock %}

{% block content %}
<h1 class="mb-4">✏️ Редактировать предмет</h1>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5>{{ item.name }}</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Название</label>
                        <input type="text" name="name" class="form-control" value="{{ item.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea name="description" class="form-control" rows="3">{{ item.description }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Цена</label>
                        <input type="number" name="price" class="form-control" value="{{ item.price }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Категория</label>
                        <select name="category" class="form-select">
                            <option value="weapon" {% if item.category == 'weapon' %}selected{% endif %}>Оружие</option>
                            <option value="armor" {% if item.category == 'armor' %}selected{% endif %}>Броня</option>
                            <option value="potion" {% if item.category == 'potion' %}selected{% endif %}>Зелье</option>
                            <option value="cosmetic" {% if item.category == 'cosmetic' %}selected{% endif %}>Косметика</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Редкость</label>
                        <select name="rarity" class="form-select">
                            <option value="common" {% if item.rarity == 'common' %}selected{% endif %}>📦 Обычный</option>
                            <option value="rare" {% if item.rarity == 'rare' %}selected{% endif %}>🔵 Редкий</option>
                            <option value="epic" {% if item.rarity == 'epic' %}selected{% endif %}>🟣 Эпический</option>
                            <option value="legendary" {% if item.rarity == 'legendary' %}selected{% endif %}>🟠 Легендарный</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Требуемый уровень</label>
                        <input type="number" name="level_required" class="form-control" value="{{ item.level_required }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Слот экипировки</label>
                        <select name="slot" class="form-select">
                            <option value="weapon" {% if item.slot == 'weapon' %}selected{% endif %}>⚔️ Оружие</option>
                            <option value="head" {% if item.slot == 'head' %}selected{% endif %}>🪖 Голова</option>
                            <option value="body" {% if item.slot == 'body' %}selected{% endif %}>🛡️ Тело</option>
                            <option value="accessory" {% if item.slot == 'accessory' %}selected{% endif %}>💍 Аксессуар</option>
                            <option value="other" {% if item.slot == 'other' %}selected{% endif %}>📦 Другое</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Прочность</label>
                        <input type="number" name="durability" class="form-control" value="{{ item.durability }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Бонусные характеристики (JSON)</label>
                        <textarea name="bonus_stats" class="form-control" rows="2">{{ item.bonus_stats or '' }}</textarea>
                        <small class="text-muted">Пример: {"strength": 5, "agility": 3, "intelligence": 2}</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Количество на складе</label>
                        <input type="number" name="stock" class="form-control" value="{{ item.stock }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">URL изображения</label>
                        <input type="text" name="image_url" class="form-control" value="{{ item.image_url }}">
                    </div>
                    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                    <a href="{{ url_for('admin_panel') }}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
